<!-- create.html -->
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    
    {{ form.as_p }}
    
    <h3>Изображения (минимум 2)</h3>
    {{ formset.management_form }}
    
    {% for form in formset %}
        <div class="image-form">
            {{ form.as_p }}
        </div>
    {% endfor %}
    
    <button type="submit">Сохранить</button>
</form>
